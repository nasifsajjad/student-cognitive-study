    <title>Student Cognitive Profile Study</title>
    <style>
        /* Forces the main website to occupy exactly 100% of the screen with zero scrolling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Removes the website's outer scrollbar */
            background-color: #f0ebf8; /* Matches Google Forms theme */
        }

        /* Container scales perfectly to fill the browser window */
        .form-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        /* The iframe now handles 100% of the vertical space and scrolling */
        iframe {
            width: 100%;
            max-width: 640px; /* Keeps the form layout crisp and un-stretched */
            height: 100vh;    /* Fills the exact height of the screen */
            border: none;
            display: block;
        }
    </style>
</head>

        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeUZ4ldLMkdgTpud_PlU6UMI1xaKJdnRGPb3u8DmnfuLA8YGw/viewform?embedded=true" marginheight="0" marginwidth="0">Loading…</iframe>
